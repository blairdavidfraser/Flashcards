<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Language Flashcards</title>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>

<body>

    <div id="topBar">
        <div id="hamburger">&#9776;</div>
        <div id="topTitle"><a href="index.html">DotLingo</a> :: Flashcards</div>
    </div>

    <div id="dropdownMenu" class="hidden">
        <div id="autopilotToggle" class="menu-item" onclick="toggleAutopilot()"></div>
        <div id="foreignSoundToggle" class="menu-item" onclick="toggleSound('foreign')"></div>
        <div id="nativeSoundToggle" class="menu-item" onclick="toggleSound('native')"></div>
        <div id="editCardMenuItem" class="menu-item hidden" onclick="showCardEdit()">Edit Card</div>
    </div>

    <!-- GAME MENU -->
    <div id="gameMenu" class="menu-container">

        <div class="language-block">
            <div class="language-title">Spanish</div>

            <div class="game-row">
                <div class="game-name">Vocabulary</div>
                <div class="game-actions">
                    <a href="#" onclick="selectGame('Vocabulary', 'Spanish')">Learn</a>
                    ::
                    <a href="#" onclick="editGameDataset('Vocabulary','Spanish')">Edit</a>
                    ::
                    <a href="#" onclick="statistics('Vocabulary','Spanish')">Statistics</a>
                </div>
            </div>

            <div class="game-row">
                <div class="game-name">Verbs</div>
                <div class="game-actions">
                    <a href="#" onclick="selectGame('Verbs', 'Spanish')">Learn</a>
                    ::
                    <a href="#" onclick="editGameDataset('Verbs','Spanish')">Edit</a>
                    ::
                    <a href="#" onclick="statistics('Verbs','Spanish')">Statistics</a>
                </div>
            </div>
        </div>

        <div class="language-block">
            <div class="language-title">French</div>

            <div class="game-row">
                <div class="game-name">Vocabulary</div>
                <div class="game-actions">
                    <a href="#" onclick="selectGame('Vocabulary','French')">Learn</a>
                    ::
                    <a href="#" onclick="editGameDataset('Vocabulary','French')">Edit</a>
                    ::
                    <a href="#" onclick="statistics('Vocabulary','French')">Statistics</a>
                </div>
            </div>

            <div class="game-row">
                <div class="game-name">Verbs</div>
                <div class="game-actions">
                    <a href="#" onclick="selectGame('Verbs','French')">Learn</a>
                    ::
                    <a href="#" onclick="editGameDataset('Verbs','French')">Edit</a>
                    ::
                    <a href="#" onclick="statistics('Verbs','French')">Statistics</a>
                </div>
            </div>
        </div>

    </div>

    <!-- CONFIG -->
    <div id="configurationMenu" class="hidden">
        <h3 id="languageTitle"></h3>

        <div class="row">
            <label><input type="radio" name="direction" value="recognition"
                    onclick="selectGameDirection('recognition')">Recognition</label>
            <label><input type="radio" name="direction" value="recall" onclick="selectGameDirection('recall')"
                    checked>Recall</label>
            <label><input type="radio" name="direction" value="shuffle"
                    onclick="selectGameDirection('shuffle')">Shuffle</label>
        </div>

        <hr class="menu-divider">

        <div id="categoryFilters" class="row category-filters"></div>

        <hr class="menu-divider">

        <div class="row">
            <a href="#" onclick="startGame('normal'); return false;">Normal</a> ::
            <a href="#" onclick="startGame('new'); return false;">New</a> ::
            <a href="#" onclick="startGame('hard'); return false;">Hard</a> ::
            <a href="#" onclick="startGame('review'); return false;">Review</a>
        </div>

        <br><br>
        <button onclick="backToMenu()">Back</button>
    </div>

    <!-- STUDY -->
    <div id="studyArea" class="hidden">

        <div id="card" class="card" onclick="finishRound()">
            <div id="cardHeader" class="card-header"></div>
            <div id="cardTop" class="card-top">Press Here</div>
            <div id="cardDivider" class="card-divider">--------- <span id="cardEmoji"></span> ---------</div>
            <div id="cardBottom" class="card-bottom"></div>
            <div id="cardComment" class="muted-text mt-medium"></div>
            <div id="cardFooter" class="card-footer">
                <div id="cardInfo" class="muted-text"></div>
            </div>
        </div>

        <div class="difficulty hidden" id="difficultyButtons">
            <button onclick="cycleRound(0, -1)">&larr;</button>
            <button onclick="cycleRound(1, 0)">1</button>
            <button onclick="cycleRound(2, 0)">2</button>
            <button onclick="cycleRound(3, 0)">3</button>
            <button onclick="cycleRound(4, 1)">&rarr;</button>
        </div>

        <div class="difficulty hidden" id="nextButtons">
            <button onclick="cycleRound()">&gt;&gt;</button>
        </div>

        <button id="exitButton" class="mt-small" onclick="endGame()">Exit</button>

    </div>

    <!-- EDIT DATA -->
    <div id="editArea" class="hidden">
        <h3 id="editTitle"></h3>

        <textarea id="editBox"></textarea>

        <br>
        <button onclick="selectAllText()">Select All</button>
        <button onclick="saveGameDataset()">Save</button>
        <button onclick="backToMenu()">Cancel</button>
        <button id="saveToGithubButton" onclick="saveToGitHub()">Save to GitHub</button>

        <div id="githubConfigSection" class="hidden">
            <br>
            <div class="form-container">
                <label>Personal access token:<br>
                    <input type="password" id="githubToken" class="input-wide" placeholder="ghp_..."></label><br><br>
                <label>Repository (owner/repo):<br>
                    <input type="text" id="githubRepo" class="input-wide" placeholder="username/flashcards"></label><br><br>
                <label>Filename prefix (optional):<br>
                    <input type="text" id="githubPrefix" class="input-wide" placeholder="e.g. Blair"></label>
            </div>
            <br>
            <button onclick="saveGithubConfig()">Save Config</button>
            <button onclick="cancelGithubConfig()">Cancel</button>
        </div>

    </div>

    <!-- STATS -->
    <div id="statsArea" class="hidden">
        <h3 id="statsTitle"></h3>

        <div id="statsContent" class="stats-box"></div>
        <br />
        <button onclick="backToMenu()">Back</button>
    </div>

    <!-- EDIT CARD -->
    <div id="editCardArea" class="hidden">

        <h3>Edit Card</h3>

        <div class="form-container">
            <label>Front: <input type="text" id="editFront" class="input-wide"></label><br><br>
            <label>Back: <input type="text" id="editBack" class="input-wide"></label><br><br>
            <label>Emoji: <input type="text" id="editEmoji" class="input-wide"></label><br><br>
            <label>Category: <input type="text" id="editCategory" class="input-wide"></label><br><br>
            <label>Comment: <input type="text" id="editComment" class="input-wide"></label><br><br>
        </div>

        <br>
        <button onclick="saveCardEdit()">Save</button>
        <button onclick="cancelEdit()">Cancel</button>

    </div>

    <script type="module" src="assets/scripts/app.js"></script>

</body>

</html>
