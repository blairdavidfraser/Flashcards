<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Language Flashcards</title>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>

<body>

    <h2><a href="index.html">DotLingo</a> :: Flashcards</h2>


    <div id="mainMenu">

        <table style="margin: 20px auto; border-collapse: collapse;">
            <tr>
                <td style="padding: 10px; font-weight: bold; text-align: right;">Spanish</td>
                <td style="padding: 10px; font-weight: bold; text-align: right;">--</td>
                <td style="padding: 10px;">
                    <a href="#" onclick="chooseLanguage('flashcards', 'spanish')" style="margin-right: 15px;">Learn</a>
                    ::
                    <a href="#" onclick="editLanguage('flashcards','spanish')" style="margin: 0 15px;">Edit</a>
                    ::
                    <a href="#" onclick="showStats('flashcards','spanish');" style="margin-left: 15px;">Statistics</a>
                </td>
            </tr>
            <tr>
                <td style="padding: 10px; font-weight: bold; text-align: right;">French</td>
                <td style="padding: 10px; font-weight: bold; text-align: right;">--</td>
                <td style="padding: 10px;">
                    <a href="#" onclick="chooseLanguage('flashcards','french')" style="margin-right: 15px;">Learn</a>
                    ::
                    <a href="#" onclick="editLanguage('flashcards','french')" style="margin: 0 15px;">Edit</a>
                    ::
                    <a href="#" onclick="showStats('flashcards','french');" style="margin-left: 15px;">Statistics</a>
                </td>
            </tr>
        </table>

    </div>

    <div id="modeMenu" style="display:none">
        <h3 id="languageTitle"></h3>

        <!-- Mode Selection -->
        <div class="row">
            <label><input type="radio" name="mode" value="recognition"
                    onclick="selectMode('recognition')">Recognition</label>
            <label><input type="radio" name="mode" value="recall" onclick="selectMode('recall')" checked>Recall</label>
            <label><input type="radio" name="mode" value="shuffle" onclick="selectMode('shuffle')">Shuffle</label>
        </div>

        <!-- Sound Selection -->
        <div class="row">
            <label><input type="radio" name="sound" value="on" onclick="selectSound(true)" checked>Sound</label>
            <label><input type="radio" name="sound" value="off" onclick="selectSound(false)">No sound</label>
        </div>

        <hr class="menu-divider">

        <!-- Category Selection -->
        <div id="categoryFilters" class="row" style="text-align:left; display:inline-block;">
            <!-- dynamically filled -->
        </div>

        <hr class="menu-divider">

        <!-- Start Game -->
        <div class="row mode-buttons">
            <div class="row">
                <a href="#" onclick="startNormal(); return false;">Normal</a> ::
                <a href="#" onclick="startNew(); return false;">New</a> ::
                <a href="#" onclick="startHard(); return false;">Hard</a> ::
                <a href="#" onclick="startReview(); return false;">Review</a>
            </div>
        </div>

        <br><br>
        <button onclick="backToMenu()">Back</button>
    </div>

    <div id="studyArea" style="display:none">

        <div id="card" class="card">
            <div id="cardHeader" class="card-header"></div>
            <div id="cardTop" class="card-top">Press Here</div>
            <div id="cardDivider" class="card-divider">--------- <span id="cardEmoji"></span> ---------</div>
            <div id="cardBottom" class="card-bottom"></div>
            <div id="cardFooter" class="card-footer"></div>
        </div>
        <button id="startBtn" onclick="nextCard()">Start</button>

        <div class="difficulty" id="difficultyButtons" style="display:none">
            <button onclick="rate(0, -1)">&larr;</button>
            <button onclick="rate(1, 0)">1</button>
            <button onclick="rate(2, 0)">2</button>
            <button onclick="rate(3, 0)">3</button>
            <button onclick="rate(4, 1)">&rarr;</button>
        </div>

        <button onclick="exitStudy()" style="margin-top:8px;">Exit</button>
        <div id="cardInfo" style="color:#888; font-size:12px; margin-top:16px;"></div>

    </div>

    <div id="editArea" style="display:none">

        <h3 id="editTitle"></h3>

        <textarea id="editBox"></textarea>

        <br>
        <button onclick="selectAllText()">Select All</button>
        <button onclick="saveEdit()">Save</button>
        <button onclick="backToMenu()">Cancel</button>

    </div>

    <div id="statsArea" style="display:none">

        <h3 id="statsTitle"></h3>

        <div id="statsContent" style="text-align: left; display: inline-block; margin: 20px auto;">
        </div>

        <br><br>
        <button onclick="backToMenu()">Back</button>

    </div>

    <div id="editCardArea" style="display:none">

        <h3>Edit Card</h3>

        <div style="text-align: left; display: inline-block; margin: 20px auto;">
            <label>Front: <input type="text" id="editFront" style="width:300px;"></label><br><br>
            <label>Back: <input type="text" id="editBack" style="width:300px;"></label><br><br>
            <label>Emoji: <input type="text" id="editEmoji" style="width:300px;"></label><br><br>
            <label>Category: <input type="text" id="editCategory" style="width:300px;"></label><br><br>
        </div>

        <br>
        <button onclick="saveCardEdit()">Save</button>
        <button onclick="cancelEdit()">Cancel</button>

    </div>

    <!-- Load application javascript -->
    <script src="assets/scripts/app.js">


    </script>

</body>

</html>
