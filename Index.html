<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Language Flashcards</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #111;
            color: white;
            text-align: center;
        }

        button {
            padding: 12px;
            margin: 6px;
            font-size: 16px;
            border-radius: 8px;
            border: none;
        }

        .row {
            margin-top: 10px;
        }

        .card {
            margin: 40px auto;
            padding: 30px;
            background: #222;
            border-radius: 12px;
            width: 90%;
            max-width: 500px;
            font-size: 22px;
            cursor: pointer;
            box-sizing: border-box;
        }

        @media (max-width: 600px) {
            .card {
                width: 100%;
                padding: 20px;
                margin: 20px auto;
            }
        }

        textarea {
            width: 95%;
            height: 350px;
            background: #222;
            color: white;
            font-size: 14px;
        }

        .difficulty button {
            width: 60px;
            font-size: 20px;
        }
    </style>
</head>

<body>

    <h2>Language Flashcards</h2>


    <div id="mainMenu">

        <div class="row">
            <button onclick="chooseLanguage('spanish')">Learn Spanish</button>
            <button onclick="chooseLanguage('french')">Learn French</button>
        </div>

        <div class="row">
            <button onclick="resetLanguage('spanish')">Reset Spanish</button>
            <button onclick="resetLanguage('french')">Reset French</button>
        </div>

        <div class="row">
            <button onclick="showStats('spanish')">Stats Spanish</button>
            <button onclick="showStats('french')">Stats French</button>
        </div>

    </div>

    <div id="modeMenu" style="display:none">
        <h3 id="languageTitle"></h3>

        <div class="row">
            <label><input type="radio" name="mode" value="recognition"
                    onclick="selectMode('recognition')">Recognition</label>
            <label><input type="radio" name="mode" value="recall" onclick="selectMode('recall')" checked>Recall</label>
        </div>
        <div class="row">
            <button onclick="startNormal()">Normal</button>
            <button onclick="startNew()">New</button>
            <button onclick="startHard()">Hard</button>
            <button onclick="startEasy()">Easy</button>
        </div>

        <br><br>
        <button onclick="backToMenu()">Back</button>
    </div>

    <div id="studyArea" style="display:none">

        <div id="card" class="card">Press Here</div>

        <button id="startBtn" onclick="nextCard()">Start</button>

        <div class="difficulty" id="difficultyButtons" style="display:none">
            <button onclick="rate(0, -1)" style="background-color: red;">&larr;</button>
            <button onclick="rate(1, 0)">1</button>
            <button onclick="rate(2, 0)">2</button>
            <button onclick="rate(3, 0)">3</button>
            <button onclick="rate(4, 1)" style="background-color: red;">&rarr;</button>
        </div>

        <br>
        <button onclick="exitStudy()">Exit</button>

    </div>

    <div id="resetArea" style="display:none">

        <h3 id="resetTitle"></h3>

        <textarea id="resetBox"></textarea>

        <br>
        <button onclick="selectAllText()">Select All</button>
        <button onclick="saveReset()">Save</button>
        <button onclick="backToMenu()">Cancel</button>

    </div>

    <div id="statsArea" style="display:none">

        <h3 id="statsTitle"></h3>

        <div id="statsContent" style="text-align: left; display: inline-block; margin: 20px auto;">
        </div>

        <br><br>
        <button onclick="backToMenu()">Back</button>

    </div>

    <script>

        const STORAGE_PREFIX = "flashcards_"

        let currentLang = null
        let currentMode = null
        let filterMode = null
        let deck = []
        let currentCard = null
        let showingAnswer = false

        function today() {
            return new Date().toISOString().slice(0, 10)
        }

        function loadDeck(lang) {

            let raw = localStorage.getItem(STORAGE_PREFIX + lang)
            if (!raw) return []
            let arr = JSON.parse(raw)
            arr.forEach(c => {
                if (c.enabled !== undefined) {
                    // old boolean format
                    c.level = c.enabled ? 0 : -1
                    delete c.enabled
                }
                if (c.level === undefined) {
                    c.level = 0
                }
            })
            return arr
        }

        function saveDeck(lang) {
            localStorage.setItem(STORAGE_PREFIX + lang, JSON.stringify(deck))
        }

        function chooseLanguage(lang) {

            currentLang = lang
            currentMode = 'recall'

            document.getElementById("mainMenu").style.display = "none"
            document.getElementById("modeMenu").style.display = "block"

            document.getElementById("languageTitle").innerText =
                lang === "spanish" ? "Spanish" : "French"

            deck = loadDeck(lang)

        }

        function backToMenu() {

            document.getElementById("mainMenu").style.display = "block"
            document.getElementById("modeMenu").style.display = "none"
            document.getElementById("studyArea").style.display = "none"
            document.getElementById("resetArea").style.display = "none"
            document.getElementById("statsArea").style.display = "none"

        }

        function startStudy(mode) {

            currentMode = mode

            document.getElementById("modeMenu").style.display = "none"
            document.getElementById("studyArea").style.display = "block"

            document.getElementById("startBtn").style.display = "none"

            nextCard()

        }

        function selectMode(mode) {
            currentMode = mode
            filterMode = null
        }

        function startNormal() {
            filterMode = 'normal'
            if (!currentMode) return
            startStudy(currentMode)
        }

        function startNew() {
            filterMode = 'new'
            if (!currentMode) return
            startStudy(currentMode)
        }

        function startHard() {
            filterMode = 'hard'
            if (!currentMode) return
            startStudy(currentMode)
        }

        function startEasy() {
            filterMode = 'easy'
            if (!currentMode) return
            startStudy(currentMode)
        }

        function exitStudy() {

            saveDeck(currentLang)
            backToMenu()

        }

        function pickCard() {

            let enabled = deck

            // Apply filter mode
            if (filterMode === 'normal') {
                enabled = enabled.filter(c => c.level >= 0)
            } else if (filterMode === 'new') {
                enabled = enabled.filter(c => c.level >= 0 && (c.seen < 3 || (Date.now() - parseDate(c.added)) < 86400000 * 5))
            } else if (filterMode === 'hard') {
                enabled = enabled.filter(c => c.level >= 1)
            } else if (filterMode === 'easy') {
                enabled = enabled.filter(c => c.level < 0)
            } else {
                // default to normal if no filter mode set
                enabled = enabled.filter(c => c.level >= 0)
            }

            if (enabled.length === 0) return null

            let weights = enabled.map(c => {

                let failRate = (c.score < 0) ? Math.abs(c.score) + 1 : 1
                let recentBoost = (Date.now() - c.added) < 86400000 * 7 ? 3 : 1
                let seenPenalty = Math.max(1, c.seen / 5)

                return failRate * recentBoost / seenPenalty

            })

            let total = weights.reduce((a, b) => a + b, 0)

            let r = Math.random() * total

            for (let i = 0; i < enabled.length; i++) {

                r -= weights[i]

                if (r <= 0) return enabled[i]

            }

            return enabled[0]

        }

        function nextCard() {

            currentCard = pickCard()

            if (!currentCard) {

                document.getElementById("card").innerText = "No cards."
                return

            }

            showingAnswer = false

            let text = currentMode === "recall"
                ? currentCard.back
                : currentCard.front

            if (currentMode === "shuffle" || currentMode === "hardcards") {
                text = Math.random() < 0.5 ? currentCard.front : currentCard.back
            }

            currentCard.showFront = text === currentCard.front

            document.getElementById("card").innerText = text

            document.getElementById("difficultyButtons").style.display = "none"

            document.getElementById("startBtn").style.display = "none"

        }

        document.getElementById("card").onclick = function () {

            if (!currentCard) return

            if (showingAnswer) return

            showingAnswer = true

            let text = currentCard.showFront
                ? currentCard.back
                : currentCard.front

            document.getElementById("card").innerText = text

            document.getElementById("difficultyButtons").style.display = "block"

        }

        function rate(d, l) {
            if (!currentCard) return

            currentCard.seen++
            currentCard.lastSeen = Date.now()
            currentCard.level = l
            currentCard.score += (3 - d)

            saveDeck(currentLang)
            nextCard()
        }


        function resetLanguage(lang) {

            currentLang = lang

            deck = loadDeck(lang)

            document.getElementById("mainMenu").style.display = "none"
            document.getElementById("resetArea").style.display = "block"

            document.getElementById("resetTitle").innerText = "Reset " + lang

            let lines = []

            lines.push("#front|back|added|lastSeen|seen|score|level")

            deck.forEach(c => {

                lines.push(
                    [
                        c.front,
                        c.back,
                        formatDate(c.added),
                        formatDate(c.lastSeen),
                        c.seen,
                        c.score,
                        c.level
                    ].join("|")
                )

            })

            document.getElementById("resetBox").value = lines.join("\n")

        }

        function formatDate(epoch) {
            if (!epoch) return ""
            return new Date(epoch).toISOString().slice(0, 10)
        }

        function parseDate(d) {
            if (!d) return Date.now()
            return new Date(d).getTime()
        }

        function saveReset() {

            let text = document.getElementById("resetBox").value

            let lines = text.split("\n")

            let newDeck = []

            for (let line of lines) {

                line = line.trim()

                if (!line || line.startsWith("#")) continue

                let parts = line.split("|")

                let card = {

                    front: parts[0],
                    back: parts[1],
                    added: parseDate(parts[2]),
                    lastSeen: parseDate(parts[3]),
                    seen: parseInt(parts[4]) || 0,
                    score: parseInt(parts[5]) || 0,
                    level: parseInt(parts[6]) || 0

                }

                newDeck.push(card)

            }

            deck = newDeck

            saveDeck(currentLang)

            backToMenu()

        }

        function selectAllText() {
            document.getElementById("resetBox").select()
        }

        function showStats(lang) {

            currentLang = lang
            deck = loadDeck(lang)

            let total = deck.length
            let levelCounts = {}
            let neverSeen = 0

            // Count cards at each level and cards never seen
            deck.forEach(c => {
                let level = c.level
                if (levelCounts[level] === undefined) {
                    levelCounts[level] = 0
                }
                levelCounts[level]++

                if (c.seen === 0) {
                    neverSeen++
                }
            })

            // Build stats display
            let html = `
                <p><strong>Total Cards:</strong> ${total}</p>
                <p><strong>Never Seen:</strong> ${neverSeen}</p>
            `

            // Sort levels numerically
            let levels = Object.keys(levelCounts).sort((a, b) => parseInt(a) - parseInt(b))
            levels.forEach(level => {
                let count = levelCounts[level]
                html += `<p><strong>Level ${level}:</strong> ${count}</p>`
            })

            document.getElementById("mainMenu").style.display = "none"
            document.getElementById("statsArea").style.display = "block"
            document.getElementById("statsTitle").innerText = lang.charAt(0).toUpperCase() + lang.slice(1) + " Statistics"
            document.getElementById("statsContent").innerHTML = html

        }

    </script>

</body>

</html>
