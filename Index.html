<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Language Flashcards</title>

    <style>
        body {
            font-family: system-ui;
            background: #111827;
            color: white;
            text-align: center;
            margin: 0;
        }

        h1 {
            margin: 20px
        }

        .row {
            margin: 10px
        }

        button {
            font-size: 18px;
            padding: 12px 18px;
            margin: 6px;
            border-radius: 10px;
            border: none;
        }

        .primary {
            background: #2563eb;
            color: white
        }

        .card {
            font-size: 30px;
            padding: 40px 20px;
            margin: 20px;
            background: #1f2937;
            border-radius: 16px;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        textarea {
            width: 92%;
            height: 220px;
            font-size: 16px;
        }

        .hidden {
            display: none
        }

        .answer {
            font-size: 20px;
            margin-bottom: 15px;
            opacity: .8;
        }

        .rating button {
            width: 60px;
            font-size: 20px;
        }

        .stat {
            margin: 6px
        }
    </style>
</head>

<body>

    <h1>Flashcards</h1>

    <div id="home">

        <div class="row">
            <button onclick="chooseLanguage('spanish')" class="primary">Learn Spanish</button>
            <button onclick="chooseLanguage('french')" class="primary">Learn French</button>
        </div>

        <div class="row">
            <button onclick="openAdd('spanish')">Add Spanish</button>
            <button onclick="openAdd('french')">Add French</button>
        </div>

        <div class="row">
            <button onclick="openReset('spanish')">Reset Spanish</button>
            <button onclick="openReset('french')">Reset French</button>
        </div>

        <div class="row">
            <button onclick="showStats('spanish')">Spanish Stats</button>
            <button onclick="showStats('french')">French Stats</button>
        </div>

        <div class="row">
            <button onclick="exportDeck('spanish')">Export Spanish</button>
            <button onclick="exportDeck('french')">Export French</button>
        </div>

    </div>



    <div id="modeScreen" class="hidden">

        <h2 id="modeTitle"></h2>

        <button onclick="startGame('recognition')" class="primary">Recognition</button>
        <button onclick="startGame('recall')" class="primary">Recall</button>
        <button onclick="startGame('shuffle')" class="primary">Shuffle</button>
        <button onclick="startGame('hard')">Hard Cards</button>

        <br><br>
        <button onclick="goHome()">Back</button>

    </div>



    <div id="gameScreen" class="hidden">

        <div id="card" class="card" onclick="reveal()"></div>

        <div id="answerBlock" class="hidden">

            <div id="answer" class="answer"></div>

            <div class="rating">
                <button onclick="rate(1)">1</button>
                <button onclick="rate(2)">2</button>
                <button onclick="rate(3)">3</button>
                <button onclick="rate(4)">4</button>
            </div>

        </div>

        <br>
        <button onclick="goHome()">Quit</button>

    </div>



    <div id="addScreen" class="hidden">

        <h2 id="addTitle"></h2>

        <p>Format: phrase | translation</p>

        <textarea id="addBox"></textarea>

        <br>
        <button onclick="saveAdd()" class="primary">Save</button>
        <button onclick="goHome()">Cancel</button>

    </div>



    <div id="resetScreen" class="hidden">

        <h2 id="resetTitle"></h2>

        <textarea id="resetBox"></textarea>

        <br>
        <button onclick="saveReset()" class="primary">Save</button>
        <button onclick="goHome()">Cancel</button>

    </div>



    <div id="statsScreen" class="hidden">

        <h2 id="statsTitle"></h2>

        <div id="statsBody"></div>

        <br>
        <button onclick="goHome()">Back</button>

    </div>



    <script>

        let language = ""
        let mode = ""
        let currentIndex = null
        let showingForeign = true



        function dbKey(lang) { return "flash_" + lang }

        function getDB(lang) {
            let d = localStorage.getItem(dbKey(lang))
            return d ? JSON.parse(d) : []
        }

        function saveDB(lang, data) {
            localStorage.setItem(dbKey(lang), JSON.stringify(data))
        }



        function hideAll() {
            document.querySelectorAll("#home,#modeScreen,#gameScreen,#addScreen,#resetScreen,#statsScreen")
                .forEach(e => e.classList.add("hidden"))
        }

        function goHome() {
            hideAll()
            home.classList.remove("hidden")
        }



        function chooseLanguage(lang) {
            language = lang
            hideAll()
            modeTitle.innerText = "Learn " + lang
            modeScreen.classList.remove("hidden")
        }



        function openAdd(lang) {
            language = lang
            hideAll()
            addTitle.innerText = "Add " + lang
            addBox.value = ""
            addScreen.classList.remove("hidden")
        }



        function saveAdd() {

            let db = getDB(language)

            addBox.value.trim().split("\n").forEach(line => {

                let p = line.split("|")
                if (p.length < 2) return

                db.push({
                    foreign: p[0].trim(),
                    english: p[1].trim(),
                    shown: 0,
                    correct: 0,
                    interval: 1,
                    ease: 2.5,
                    due: Date.now()
                })

            })

            saveDB(language, db)

            goHome()

        }



        function openReset(lang) {

            language = lang
            hideAll()

            let db = getDB(lang)

            resetTitle.innerText = "Reset " + lang

            resetBox.value = db.map(c => c.foreign + " | " + c.english).join("\n")

            resetScreen.classList.remove("hidden")

        }



        function saveReset() {

            let db = []

            resetBox.value.trim().split("\n").forEach(line => {

                let p = line.split("|")
                if (p.length < 2) return

                db.push({
                    foreign: p[0].trim(),
                    english: p[1].trim(),
                    shown: 0,
                    correct: 0,
                    interval: 1,
                    ease: 2.5,
                    due: Date.now()
                })

            })

            saveDB(language, db)

            goHome()

        }



        function startGame(m) {

            mode = m

            hideAll()

            gameScreen.classList.remove("hidden")

            nextCard()

        }



        function pickCard() {

            let db = getDB(language)
            let now = Date.now()

            let dueCards = db
                .map((c, i) => ({ c, i }))
                .filter(x => x.c.due <= now)

            if (mode === "hard") {
                dueCards = dueCards.filter(x => {
                    let rate = x.c.correct / (x.c.shown || 1)
                    return rate < 0.7
                })
            }

            if (dueCards.length > 0) {

                return dueCards[Math.floor(Math.random() * dueCards.length)].i

            }

            let soonest = 0
            let min = db[0].due

            db.forEach((c, i) => {
                if (c.due < min) { min = c.due; soonest = i }
            })

            return soonest

        }



        function nextCard() {

            let db = getDB(language)

            currentIndex = pickCard()

            let cardObj = db[currentIndex]

            if (mode === "recognition") showingForeign = true
            else if (mode === "recall") showingForeign = false
            else showingForeign = Math.random() < .5

            card.innerText = showingForeign ? cardObj.foreign : cardObj.english
            answer.innerText = showingForeign ? cardObj.english : cardObj.foreign

            answerBlock.classList.add("hidden")

        }



        function reveal() {
            answerBlock.classList.remove("hidden")
        }



        function rate(score) {

            let db = getDB(language)
            let c = db[currentIndex]

            c.shown++

            if (score <= 2) c.correct++

            if (score == 4) { // forgot

                c.interval = 1
                c.ease = Math.max(1.3, c.ease - 0.2)

            }

            if (score == 3) { // hard

                c.interval = Math.max(1, Math.round(c.interval * 1.2))
                c.ease = Math.max(1.3, c.ease - 0.1)

            }

            if (score == 2) { // good

                c.interval = Math.round(c.interval * c.ease)

            }

            if (score == 1) { // very easy

                c.interval = Math.round(c.interval * c.ease * 1.4)
                c.ease += 0.1

            }

            c.due = Date.now() + c.interval * 86400000

            saveDB(language, db)

            nextCard()

        }



        function showStats(lang) {

            let db = getDB(lang)

            hideAll()

            statsTitle.innerText = lang + " statistics"

            let total = db.length
            let shown = db.reduce((a, b) => a + b.shown, 0)
            let correct = db.reduce((a, b) => a + b.correct, 0)

            let accuracy = shown ? Math.round(correct / shown * 100) : 0

            statsBody.innerHTML = `
<div class="stat">Cards: ${total}</div>
<div class="stat">Reviews: ${shown}</div>
<div class="stat">Accuracy: ${accuracy}%</div>
`

            statsScreen.classList.remove("hidden")

        }



        function exportDeck(lang) {

            let db = getDB(lang)

            let text = db.map(c => `${c.foreign} | ${c.english}`).join("\n")

            navigator.clipboard.writeText(text)

            alert("Deck copied")

        }



        goHome()

    </script>

</body>

</html>
