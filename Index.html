<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Language Flashcards</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #111;
            color: white;
            text-align: center;
        }

        button {
            padding: 12px;
            margin: 6px;
            font-size: 16px;
            border-radius: 8px;
            border: none;
        }

        .row {
            margin-top: 10px;
        }

        .card {
            margin: 40px auto;
            padding: 30px;
            background: #222;
            border-radius: 12px;
            width: 90%;
            max-width: 500px;
            font-size: 22px;
            cursor: pointer;
        }

        textarea {
            width: 95%;
            height: 350px;
            background: #222;
            color: white;
            font-size: 14px;
        }

        .difficulty button {
            width: 60px;
            font-size: 20px;
        }

        #copyNotification {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 18px;
            display: none;
            z-index: 1000;
        }

        #copyNotification {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 18px;
            display: none;
            z-index: 1000;
        }
    </style>
</head>

<body>

    <h2>Language Flashcards</h2>

    <div id="copyNotification">Text Copied</div>

    <div id="copyNotification">Text Copied</div>

    <div id="mainMenu">

        <div class="row">
            <button onclick="chooseLanguage('spanish')">Learn Spanish</button>
            <button onclick="chooseLanguage('french')">Learn French</button>
        </div>

        <div class="row">
            <button onclick="resetLanguage('spanish')">Reset Spanish</button>
            <button onclick="resetLanguage('french')">Reset French</button>
        </div>

    </div>

    <div id="modeMenu" style="display:none">
        <h3 id="languageTitle"></h3>

        <button onclick="startStudy('recognition')">Recognition</button>
        <button onclick="startStudy('recall')">Recall</button>
        <button onclick="startStudy('hardcards')">Hard Cards</button>

        <br><br>
        <button onclick="backToMenu()">Back</button>
    </div>

    <div id="studyArea" style="display:none">

        <div id="card" class="card">Press Here</div>

        <button id="startBtn" onclick="nextCard()">Start</button>

        <div class="difficulty" id="difficultyButtons" style="display:none">
            <button onclick="rateDisabled()" style="background-color: red;">&larr;</button>
            <button onclick="rate(1)">1</button>
            <button onclick="rate(2)">2</button>
            <button onclick="rate(3)">3</button>
            <button onclick="rateHard()" style="background-color: red;">&rarr;</button>
        </div>

        <br>
        <button onclick="exitStudy()">Exit</button>

    </div>

    <div id="resetArea" style="display:none">

        <h3 id="resetTitle"></h3>

        <textarea id="resetBox"></textarea>

        <br>
        <button onclick="copyToClipboard()">Copy</button>
        <button onclick="saveReset()">Save</button>
        <button onclick="backToMenu()">Cancel</button>

    </div>

    <script>

        const STORAGE_PREFIX = "flashcards_"

        let currentLang = null
        let currentMode = null
        let deck = []
        let currentCard = null
        let showingAnswer = false

        function today() {
            return new Date().toISOString().slice(0, 10)
        }

        function loadDeck(lang) {

            let raw = localStorage.getItem(STORAGE_PREFIX + lang)

            if (!raw) return []

            return JSON.parse(raw)
        }

        function saveDeck(lang) {
            localStorage.setItem(STORAGE_PREFIX + lang, JSON.stringify(deck))
        }

        function chooseLanguage(lang) {

            currentLang = lang

            document.getElementById("mainMenu").style.display = "none"
            document.getElementById("modeMenu").style.display = "block"

            document.getElementById("languageTitle").innerText =
                lang === "spanish" ? "Spanish" : "French"

            deck = loadDeck(lang)

        }

        function backToMenu() {

            document.getElementById("mainMenu").style.display = "block"
            document.getElementById("modeMenu").style.display = "none"
            document.getElementById("studyArea").style.display = "none"
            document.getElementById("resetArea").style.display = "none"

        }

        function startStudy(mode) {

            currentMode = mode

            document.getElementById("modeMenu").style.display = "none"
            document.getElementById("studyArea").style.display = "block"

            document.getElementById("startBtn").style.display = "none"

            nextCard()

        }

        function exitStudy() {

            saveDeck(currentLang)
            backToMenu()

        }

        function pickCard() {

            let enabled = deck.filter(c => c.enabled !== false)

            // Filter for hard cards mode
            if (currentMode === 'hardcards') {
                let mostRecentDate = Math.max(...deck.map(c => c.added || 0))
                enabled = enabled.filter(c => c.score < 0 || c.added === mostRecentDate)
            }

            if (enabled.length === 0) return null

            let weights = enabled.map(c => {

                let failRate = (c.score < 0) ? Math.abs(c.score) + 1 : 1
                let recentBoost = (Date.now() - c.added) < 86400000 * 7 ? 3 : 1
                let seenPenalty = Math.max(1, c.seen / 5)

                return failRate * recentBoost / seenPenalty

            })

            let total = weights.reduce((a, b) => a + b, 0)

            let r = Math.random() * total

            for (let i = 0; i < enabled.length; i++) {

                r -= weights[i]

                if (r <= 0) return enabled[i]

            }

            return enabled[0]

        }

        function nextCard() {

            currentCard = pickCard()

            if (!currentCard) {

                document.getElementById("card").innerText = "No cards."
                return

            }

            showingAnswer = false

            let text = currentMode === "recall"
                ? currentCard.back
                : currentCard.front

            if (currentMode === "shuffle" || currentMode === "hardcards") {
                text = Math.random() < 0.5 ? currentCard.front : currentCard.back
            }

            currentCard.showFront = text === currentCard.front

            document.getElementById("card").innerText = text

            document.getElementById("difficultyButtons").style.display = "none"

            document.getElementById("startBtn").style.display = "none"

        }

        document.getElementById("card").onclick = function () {

            if (!currentCard) return

            if (showingAnswer) return

            showingAnswer = true

            let text = currentCard.showFront
                ? currentCard.back
                : currentCard.front

            document.getElementById("card").innerText = text

            document.getElementById("difficultyButtons").style.display = "block"

        }

        function rate(d) {
            if (!currentCard) return

            currentCard.seen++
            currentCard.lastSeen = Date.now()

            currentCard.score += (3 - d)

            saveDeck(currentLang)
            nextCard()
        }

        function rateDisabled() {
            if (!currentCard) return

            currentCard.enabled = false
            currentCard.seen++
            currentCard.lastSeen = Date.now()

            saveDeck(currentLang)
            nextCard()
        }

        function rateHard() {
            if (!currentCard) return

            currentCard.score = -1
            currentCard.seen++
            currentCard.lastSeen = Date.now()

            saveDeck(currentLang)
            nextCard()
        }

        function resetLanguage(lang) {

            currentLang = lang

            deck = loadDeck(lang)

            document.getElementById("mainMenu").style.display = "none"
            document.getElementById("resetArea").style.display = "block"

            document.getElementById("resetTitle").innerText = "Reset " + lang

            let lines = []

            lines.push("#front|back|added|lastSeen|seen|score|enabled")

            deck.forEach(c => {

                lines.push(
                    [
                        c.front,
                        c.back,
                        formatDate(c.added),
                        formatDate(c.lastSeen),
                        c.seen,
                        c.score,
                        c.enabled
                    ].join("|")
                )

            })

            document.getElementById("resetBox").value = lines.join("\n")

        }

        function formatDate(epoch) {
            if (!epoch) return ""
            return new Date(epoch).toISOString().slice(0, 10)
        }

        function parseDate(d) {
            if (!d) return Date.now()
            return new Date(d).getTime()
        }

        function saveReset() {

            let text = document.getElementById("resetBox").value

            let lines = text.split("\n")

            let newDeck = []

            for (let line of lines) {

                line = line.trim()

                if (!line || line.startsWith("#")) continue

                let parts = line.split("|")

                let card = {

                    front: parts[0],
                    back: parts[1],
                    added: parseDate(parts[2]),
                    lastSeen: parseDate(parts[3]),
                    seen: parseInt(parts[4]) || 0,
                    score: parseInt(parts[5]) || 0,
                    enabled: parts[6] !== "false"

                }

                newDeck.push(card)

            }

            deck = newDeck

            saveDeck(currentLang)

            backToMenu()

        }

        function copyToClipboard() {
            let text = document.getElementById("resetBox").value
            navigator.clipboard.writeText(text)
            let notification = document.getElementById("copyNotification")
            notification.style.display = "block"
            setTimeout(() => {
                notification.style.display = "none"
            }, 2000)
        }

    </script>

</body>

</html>
