<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Language Flashcards</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #111;
            color: white;
            text-align: center;
        }

        button {
            padding: 12px;
            margin: 6px;
            font-size: 16px;
            border-radius: 8px;
            border: none;
        }

        .row {
            margin-top: 10px;
        }

        .card {
            margin: 40px auto;
            padding: 0;
            background: #222;
            border-radius: 12px;
            width: 90%;
            max-width: 500px;
            font-size: 24px;
            cursor: pointer;
            box-sizing: border-box;
            position: relative;
            overflow: hidden;
        }

        .card-header {
            font-size: 14px;
            color: #ccc;
            background: #282828;
            padding: 8px 12px;
            text-align: left;
        }

        .card-footer {
            font-size: 14px;
            color: #ccc;
            background: #282828;
            padding: 8px 12px;
            text-align: right;
            margin-top: 8px;
        }

        .card-top,
        .card-bottom {
            padding: 20px 12px;
            min-height: 60px;
        }

        .card-divider {
            text-align: center;
            margin: 12px 0;
            font-size: 18px;
            color: #666;
        }

        .card-divider #cardEmoji {
            font-size: 24px;
            vertical-align: middle;
        }


        @media (max-width: 600px) {
            .card {
                width: 100%;
                padding: 20px;
                margin: 20px auto;
            }
        }

        textarea {
            width: 95%;
            height: 350px;
            background: #222;
            color: white;
            font-size: 14px;
        }

        input[type="text"] {
            background: #222;
            color: white;
            border: 1px solid #666;
            padding: 8px;
            font-size: 16px;
            border-radius: 4px;
        }

        .difficulty button {
            width: 60px;
            font-size: 20px;
        }
    </style>
</head>

<body>

    <h2>DotLingo :: Flashcards</h2>


    <div id="mainMenu">

        <table style="margin: 20px auto; border-collapse: collapse;">
            <tr>
                <td style="padding: 10px; font-weight: bold; text-align: right;">Spanish</td>
                <td style="padding: 10px; font-weight: bold; text-align: right;">--</td>
                <td style="padding: 10px;">
                    <a href="#" onclick="chooseLanguage('spanish')"
                        style="color: #fff; text-decoration: none; margin-right: 15px;">Learn</a> ::
                    <a href="#" onclick="editLanguage('spanish')"
                        style="color: #fff; text-decoration: none; margin: 0 15px;">Edit</a> ::
                    <a href="#" onclick="showStats('spanish')"
                        style="color: #fff; text-decoration: none; margin-left: 15px;">Statistics</a>
                </td>
            </tr>
            <tr>
                <td style="padding: 10px; font-weight: bold; text-align: right;">French</td>
                <td style="padding: 10px; font-weight: bold; text-align: right;">--</td>
                <td style="padding: 10px;">
                    <a href="#" onclick="chooseLanguage('french')"
                        style="color: #fff; text-decoration: none; margin-right: 15px;">Learn</a> ::
                    <a href="#" onclick="editLanguage('french')"
                        style="color: #fff; text-decoration: none; margin: 0 15px;">Edit</a> ::
                    <a href="#" onclick="showStats('french')"
                        style="color: #fff; text-decoration: none; margin-left: 15px;">Statistics</a>
                </td>
            </tr>
        </table>

    </div>

    <div id="modeMenu" style="display:none">
        <h3 id="languageTitle"></h3>

        <div class="row">
            <label><input type="radio" name="mode" value="recognition"
                    onclick="selectMode('recognition')">Recognition</label>
            <label><input type="radio" name="mode" value="recall" onclick="selectMode('recall')" checked>Recall</label>
            <label><input type="radio" name="mode" value="shuffle" onclick="selectMode('shuffle')">Shuffle</label>
        </div>
        <div class="row">
            <label><input type="radio" name="sound" value="on" onclick="selectSound(true)">Sound</label>
            <label><input type="radio" name="sound" value="off" onclick="selectSound(false)" checked>No sound</label>
        </div>
        <div class="row">
            <button onclick="startNormal()">Normal</button>
            <button onclick="startNew()">New</button>
            <button onclick="startHard()">Hard</button>
            <button onclick="startReview()">Review</button>
        </div>

        <br><br>
        <button onclick="backToMenu()">Back</button>
    </div>

    <div id="studyArea" style="display:none">

        <div id="card" class="card">
            <div id="cardHeader" class="card-header"></div>
            <div id="cardTop" class="card-top">Press Here</div>
            <div id="cardDivider" class="card-divider">--------- <span id="cardEmoji"></span> ---------</div>
            <div id="cardBottom" class="card-bottom"></div>
            <div id="cardFooter" class="card-footer"></div>
        </div>
        <button id="startBtn" onclick="nextCard()">Start</button>

        <div class="difficulty" id="difficultyButtons" style="display:none">
            <button onclick="rate(0, -1)" style="background-color: red;">&larr;</button>
            <button onclick="rate(1, 0)">1</button>
            <button onclick="rate(2, 0)">2</button>
            <button onclick="rate(3, 0)">3</button>
            <button onclick="rate(4, 1)" style="background-color: red;">&rarr;</button>
        </div>

        <button onclick="exitStudy()" style="margin-top:8px;">Exit</button>
        <div id="cardInfo" style="color:#888; font-size:12px; margin-top:16px;"></div>

    </div>

    <div id="editArea" style="display:none">

        <h3 id="editTitle"></h3>

        <textarea id="editBox"></textarea>

        <br>
        <button onclick="selectAllText()">Select All</button>
        <button onclick="saveEdit()">Save</button>
        <button onclick="backToMenu()">Cancel</button>

    </div>

    <div id="statsArea" style="display:none">

        <h3 id="statsTitle"></h3>

        <div id="statsContent" style="text-align: left; display: inline-block; margin: 20px auto;">
        </div>

        <br><br>
        <button onclick="backToMenu()">Back</button>

    </div>

    <div id="editCardArea" style="display:none">

        <h3>Edit Card</h3>

        <div style="text-align: left; display: inline-block; margin: 20px auto;">
            <label>Front: <input type="text" id="editFront" style="width:300px;"></label><br><br>
            <label>Back: <input type="text" id="editBack" style="width:300px;"></label><br><br>
            <label>Emoji: <input type="text" id="editEmoji" style="width:300px;"></label><br><br>
            <label>Category: <input type="text" id="editCategory" style="width:300px;"></label><br><br>
        </div>

        <br>
        <button onclick="saveCardEdit()">Save</button>
        <button onclick="cancelEdit()">Cancel</button>

    </div>

    <script>

        const STORAGE_PREFIX = "flashcards_"

        let currentLang = null
        let currentMode = null
        let filterMode = null
        let soundEnabled = false
        let deck = []
        let currentCard = null
        let showingAnswer = false
        let shuffleFlip = false  // toggle for shuffle mode


        function loadDeck(lang) {

            let raw = localStorage.getItem(STORAGE_PREFIX + lang)
            if (!raw) return []
            let arr = JSON.parse(raw)
            arr.forEach(c => {
                if (c.enabled !== undefined) {
                    // old boolean format
                    c.level = c.enabled ? 0 : -1
                    delete c.enabled
                }
                if (c.level === undefined) {
                    c.level = 0
                }
                if (c.penalty === undefined) {
                    c.penalty = 0
                }
            })
            return arr
        }

        function saveDeck(lang) {
            localStorage.setItem(STORAGE_PREFIX + lang, JSON.stringify(deck))
        }

        function chooseLanguage(lang) {
            currentLang = lang
            currentMode = 'recall'

            document.getElementById("mainMenu").style.display = "none"
            document.getElementById("modeMenu").style.display = "block"

            document.getElementById("languageTitle").innerText =
                lang === "spanish" ? "Spanish" : "French"

            deck = loadDeck(lang)
        }

        function backToMenu() {
            document.getElementById("mainMenu").style.display = "block"
            document.getElementById("modeMenu").style.display = "none"
            document.getElementById("studyArea").style.display = "none"
            // hide editing and stats panels; old resetArea may not exist
            let edit = document.getElementById("editArea")
            if (edit) edit.style.display = "none"
            let reset = document.getElementById("resetArea")
            if (reset) reset.style.display = "none"
            document.getElementById("statsArea").style.display = "none"
            document.getElementById("editCardArea").style.display = "none"
        }

        function startStudy(mode) {

            currentMode = mode

            document.getElementById("modeMenu").style.display = "none"
            document.getElementById("studyArea").style.display = "block"

            document.getElementById("startBtn").style.display = "none"

            nextCard()

        }

        function selectMode(mode) {
            currentMode = mode
            filterMode = null
        }

        function selectSound(enabled) {
            soundEnabled = enabled
        }

        function startNormal() {
            filterMode = 'normal'
            if (!currentMode) return
            startStudy(currentMode)
        }

        function startNew() {
            filterMode = 'new'
            if (!currentMode) return
            startStudy(currentMode)
        }

        function startHard() {
            filterMode = 'hard'
            if (!currentMode) return
            startStudy(currentMode)
        }

        function startReview() {
            filterMode = 'review'
            if (!currentMode) return
            startStudy(currentMode)
        }

        function exitStudy() {

            saveDeck(currentLang)
            backToMenu()

        }

        function pickCard() {

            let enabled = deck

            // Apply filter mode
            if (filterMode === 'normal') {
                enabled = enabled.filter(c => c.level >= 0)
            } else if (filterMode === 'new') {
                enabled = enabled.filter(c => c.level >= 0 && (c.seen < 3 || (Date.now() - parseDate(c.added)) < 86400000 * 5))
            } else if (filterMode === 'hard') {
                enabled = enabled.filter(c => c.level >= 1)
            } else if (filterMode === 'review') {
                enabled = enabled
                    .filter(c => c.level === -1)
                    .sort((a, b) => parseDate(a.lastSeen) - parseDate(b.lastSeen))
                    .slice(0, 100)
            } else {
                // default to normal if no filter mode set
                enabled = enabled.filter(c => c.level >= 0)
            }

            if (enabled.length === 0) return null

            let weights = enabled.map(c => {

                let failRate = (c.penalty < 0) ? Math.abs(c.penalty) + 1 : 1
                let recentBoost = (Date.now() - c.added) < 86400000 * 7 ? 3 : 1
                let seenPenalty = Math.max(1, c.seen / 5)

                return failRate * recentBoost / seenPenalty

            })

            let total = weights.reduce((a, b) => a + b, 0)

            let r = Math.random() * total

            for (let i = 0; i < enabled.length; i++) {

                r -= weights[i]

                if (r <= 0) return enabled[i]

            }

            return enabled[0]

        }

        function nextCard() {

            currentCard = pickCard()

            if (!currentCard) {

                document.getElementById("cardTop").innerText = "No cards."
                document.getElementById("cardBottom").innerText = ""
                document.getElementById("cardHeader").innerText = ""
                document.getElementById("cardEmoji").innerHTML = ""
                return

            }

            showingAnswer = false

            // determine question text
            let question;
            if (currentMode === "recall") {
                question = currentCard.back
            } else if (currentMode === "recognition") {
                question = currentCard.front
            } else if (currentMode === "shuffle") {
                // alternate front/back first each card
                question = shuffleFlip ? currentCard.back : currentCard.front
                shuffleFlip = !shuffleFlip
            } else {
                // fallback
                question = currentCard.back
            }
            currentCard.showFront = question === currentCard.front

            document.getElementById("cardTop").innerText = question
            document.getElementById("cardBottom").innerText = ""
            document.getElementById("cardHeader").innerText = currentCard.category || ""
            document.getElementById("cardFooter").innerHTML = '<a href="#" onclick="showEditForm()" style="color:#ccc;text-decoration:none;">edit</a>'

            // Emoji + sound behavior
            if (currentCard.showFront) {
                // front (foreign) showing first
                document.getElementById("cardEmoji").innerHTML = currentCard.emoji || ""
                speakText(currentCard.front, currentLang)
            } else {
                // back (English) showing first
                document.getElementById("cardEmoji").innerHTML = ""
            }

            updateCardInfo()
            document.getElementById("difficultyButtons").style.display = "none"
            document.getElementById("startBtn").style.display = "none"

        }

        document.getElementById("card").onclick = function () {

            if (!currentCard) return

            if (showingAnswer) return

            showingAnswer = true

            let answer = currentCard.showFront
                ? currentCard.back
                : currentCard.front

            document.getElementById("cardBottom").innerText = answer

            // If the front (foreign) is revealed now, speak it and show emoji
            if (!currentCard.showFront) {
                speakText(currentCard.front, currentLang)
                document.getElementById("cardEmoji").innerHTML = currentCard.emoji || ""
            }

            updateCardInfo()
            document.getElementById("difficultyButtons").style.display = "block"

        }

        function rate(d, l) {
            if (!currentCard) return

            currentCard.seen++
            currentCard.lastSeen = Date.now()
            currentCard.level = l
            currentCard.penalty += (3 - d)

            saveDeck(currentLang)
            nextCard()
        }

        function updateCardInfo() {
            if (!currentCard) {
                document.getElementById("cardInfo").innerText = ''
                return
            }
            let added = parseDate(currentCard.added)
            let last = currentCard.lastSeen ? new Date(currentCard.lastSeen) : null
            let seen = currentCard.seen || 0
            document.getElementById("cardInfo").innerText =
                `level ${currentCard.level} (${currentCard.penalty}), added ${formatDate(added)}, ` +
                `last seen ${last ? formatDate(last) : 'never'}, seen ${seen}`
        }

        function showEditForm() {
            if (!currentCard) return

            document.getElementById("studyArea").style.display = "none"
            document.getElementById("editCardArea").style.display = "block"

            document.getElementById("editFront").value = currentCard.front
            document.getElementById("editBack").value = currentCard.back
            document.getElementById("editEmoji").value = currentCard.emoji || ""
            document.getElementById("editCategory").value = currentCard.category || ""
        }

        function saveCardEdit() {
            if (!currentCard) return

            currentCard.front = document.getElementById("editFront").value.trim()
            currentCard.back = document.getElementById("editBack").value.trim()
            currentCard.emoji = document.getElementById("editEmoji").value.trim()
            currentCard.category = document.getElementById("editCategory").value.trim()

            saveDeck(currentLang)

            document.getElementById("editCardArea").style.display = "none"
            document.getElementById("studyArea").style.display = "block"

            // Refresh the current card display
            nextCard()
        }

        function cancelEdit() {
            document.getElementById("editCardArea").style.display = "none"
            document.getElementById("studyArea").style.display = "block"
        }


        //---------------------------------------------------------------------
        // Language Reset screen
        //---------------------------------------------------------------------

        function editLanguage(lang) {
            currentLang = lang
            deck = loadDeck(lang)

            document.getElementById("mainMenu").style.display = "none"
            document.getElementById("editArea").style.display = "block"
            document.getElementById("editTitle").innerText = "Edit " + lang

            // Convert language data to pipeline-separated format for editing
            let lines = []
            lines.push("#front|back|emoji|category|added|lastSeen|seen|penalty|level")
            deck.forEach(c => {
                lines.push(
                    [
                        c.front,
                        c.back,
                        c.emoji || "",
                        c.category || "",
                        formatDate(c.added),
                        formatDate(c.lastSeen),
                        c.seen,
                        c.penalty,
                        c.level
                    ].join(" | ")
                )
            })
            document.getElementById("editBox").value = lines.join("\n")
        }

        function saveEdit() {
            let text = document.getElementById("editBox").value
            let lines = text.split("\n")
            let newDeck = []

            // Convert pipeline-separated format back to language data structure
            for (let line of lines) {
                line = line.trim()
                if (!line || line.startsWith("#")) continue

                let parts = line.split("|")
                // support both old format and new with emoji/category
                let card = {
                    front: parts[0].trim(),
                    back: parts[1].trim(),
                    emoji: parts[2].trim() || "",
                    category: parts[3].trim() || "",
                    added: parseDate(parts[4].trim() || today()),
                    lastSeen: parseDate(parts[5].trim() || today()),
                    seen: parseInt(parts[6]) || 0,
                    penalty: parseInt(parts[7]) || 0,
                    level: parseInt(parts[8]) || 0
                }
                newDeck.push(card)
            }

            deck = newDeck
            saveDeck(currentLang)
            backToMenu()
        }

        function selectAllText() {
            document.getElementById("editBox").select()
        }


        //---------------------------------------------------------------------
        // Language Statistics screen
        //---------------------------------------------------------------------

        function showStats(lang) {
            currentLang = lang
            deck = loadDeck(lang)

            let total = deck.length
            let levelCounts = {}
            let neverSeen = 0

            // Count cards at each level and cards never seen
            deck.forEach(c => {
                let level = c.level
                if (levelCounts[level] === undefined) {
                    levelCounts[level] = 0
                }
                levelCounts[level]++

                if (c.seen === 0) {
                    neverSeen++
                }
            })

            // Build stats display
            let todayCount = deck.filter(c => c.seen > 0 && formatDate(c.lastSeen) === today()).length;
            let html = `
                <p><strong>Total Cards:</strong> ${total}</p>
                <p><strong>Never Seen:</strong> ${neverSeen}</p>
                <p><strong>Today:</strong> ${todayCount}</p>
            `

            // Sort levels numerically
            let levels = Object.keys(levelCounts).sort((a, b) => parseInt(a) - parseInt(b))
            levels.forEach(level => {
                let count = levelCounts[level]
                html += `<p><strong>Level ${level}:</strong> ${count}</p>`
            })

            document.getElementById("mainMenu").style.display = "none"
            document.getElementById("statsArea").style.display = "block"
            document.getElementById("statsTitle").innerText = lang.charAt(0).toUpperCase() + lang.slice(1) + " Statistics"
            document.getElementById("statsContent").innerHTML = html
        }


        //---------------------------------------------------------------------
        // Utility functions 
        //---------------------------------------------------------------------

        function decodeHtmlEntities(text) {
            const textarea = document.createElement('textarea');
            textarea.innerHTML = text;
            return textarea.value;
        }

        function formatDate(epoch) {
            if (!epoch) return ""
            return new Date(epoch).toISOString().slice(0, 10)
        }

        function parseDate(d) {
            if (!d) return Date.now()
            return new Date(d).getTime()
        }

        function speakText(text, lang) {
            if (!soundEnabled || !text) return

            // Create speech synthesis utterance
            const utterance = new SpeechSynthesisUtterance(text)

            // Set language based on current language
            if (lang === 'spanish') {
                utterance.lang = 'es-ES' // Spanish (Spain) - you can adjust to 'es-MX' for Mexican Spanish, etc.
            } else if (lang === 'french') {
                utterance.lang = 'fr-FR' // French (France)
            }

            // Optional: adjust speech properties
            utterance.rate = 0.8 // Slightly slower for learning
            utterance.pitch = 1

            // Speak the text
            window.speechSynthesis.speak(utterance)
        }

    </script>

</body>

</html>
